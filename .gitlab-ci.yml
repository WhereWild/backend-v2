stages:
  - build

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_DRIVER: overlay2
  # Override in GitLab CI/CD variables if you want a different repo/name.
  DOCKER_IMAGE: "$DOCKERHUB_USERNAME/wherewild-backend"

build_and_push_dockerhub:
  stage: build
  image: docker:27
  tags: [dind-privileged]
  services:
    - name: docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
    - docker build -t "$DOCKER_IMAGE:latest" -t "$DOCKER_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$DOCKER_IMAGE:latest"
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHA"
