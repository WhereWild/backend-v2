services:
  gdal:
    build: .
    network_mode: host
    volumes:
      - .:/workspace
      - root-home:/root
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.ssh:/home/ubuntu/.ssh:ro
    environment:
      - RCLONE_CONFIG=/workspace/docker/rclone.conf
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    stdin_open: true
    tty: true

volumes:
  root-home:
